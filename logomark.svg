<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="OperationKit logomark">
  <title>OperationKit logomark — beacon in a module</title>
  <!-- The "Kit": a self-contained module -->
  <rect x="8" y="8" width="48" height="48" rx="13" fill="none" stroke="#22D3EE" stroke-width="3"/>
  <!-- The "Operation": a beacon broadcasting (mission control / live signal) -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.35"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#22D3EE" stroke-width="2.5" opacity="0.7"/>
  <circle cx="32" cy="32" r="5" fill="#22D3EE"/>
</svg>
