<svg xmlns="http://www.w3.org/2000/svg" width="430" height="96" viewBox="0 0 430 96" role="img" aria-label="OperationKit">
  <title>OperationKit wordmark (light background)</title>
  <!-- Logomark: beacon in a module, tuned for AA contrast on light surfaces -->
  <g transform="translate(12,12)">
    <rect x="6" y="6" width="60" height="60" rx="16" fill="none" stroke="#0B0E14" stroke-width="3.5"/>
    <circle cx="36" cy="36" r="22" fill="none" stroke="#0E7490" stroke-width="2.5" opacity="0.4"/>
    <circle cx="36" cy="36" r="13.5" fill="none" stroke="#0E7490" stroke-width="3" opacity="0.75"/>
    <circle cx="36" cy="36" r="6" fill="#0E7490"/>
  </g>
  <!-- Wordmark: "Operation" Mission Black + "Kit" darkened Beacon Cyan -->
  <text x="104" y="62" font-family="'Space Grotesk','Inter',system-ui,-apple-system,sans-serif" font-size="46" font-weight="600" letter-spacing="-1">
    <tspan fill="#0B0E14">Operation</tspan><tspan fill="#0E7490">Kit</tspan>
  </text>
</svg>
