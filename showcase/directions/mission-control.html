<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>OperationKit · Mission Control</title>
<link rel="icon" href="../../favicon-caret.svg">
<link rel="stylesheet" href="../fonts.css">
<style>
:root{
  --ok-signal:#ff5a1f; --ok-ember:#d9430d; --ok-carbon:#0e1116;
  --surface-0:#0c0f14; --surface-1:#12161d; --surface-2:#161b22; --surface-3:#1e242d; --surface-4:#28303b;
  --fg-0:#f3f5f7; --fg-1:#c2c8d2; --fg-2:#8a93a3; --fg-3:#5b6472;
  --line:#222936; --line-soft:#1b212b; --line-strong:#2c3543;
  --accent:var(--ok-signal); --accent-hover:#ff6f3c; --accent-press:var(--ok-ember); --accent-fg:#ffffff;
  --accent-tint:rgba(255,90,31,.12); --accent-line:rgba(255,90,31,.32);
  --ok-verify:#1fb877; --ok-amber:#e6a700; --ok-alarm:#e5564b;
  --st-planning:#9b8cf0; --st-queue:#8b8a84; --st-working:#5b9df0; --st-ai:#46c2b6; --st-review:#e0a458; --st-human:var(--accent); --st-done:var(--ok-verify); --st-blocked:#e5564b;
  --agent-cto:#6f9ad8; --agent-cmo:#d389b0; --agent-coo:#6fb58c; --agent-cfo:#d6a24e; --agent-general:#8c8a92;
  --font-display:Geist,"Inter Tight",system-ui,sans-serif; --font-body:Inter,system-ui,sans-serif; --font-mono:"Geist Mono","JetBrains Mono",ui-monospace,monospace;
  --r-xs:4px; --r-sm:6px; --r-md:8px; --r-lg:11px; --r-xl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--surface-0); color:var(--fg-1);
  font-family:var(--font-body); font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  min-height:100vh;
}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1,"ss01" 1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
svg{display:block}

/* ---------- App scaffold ---------- */
#root{min-height:100vh;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;min-height:100vh;background:var(--surface-0)}

/* ---------- Header ---------- */
.hdr{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px; border-bottom:1px solid var(--line);
  background:var(--surface-0); position:sticky; top:0; z-index:20;
}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{width:22px;height:22px;border-radius:var(--r-sm);background:var(--accent);display:flex;align-items:center;justify-content:center}
.brand-mark svg{stroke:var(--accent-fg)}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--fg-0);letter-spacing:-.01em}
.brand-sub{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);padding-left:9px;margin-left:3px;border-left:1px solid var(--line)}
.hdr-spacer{flex:1}
.cmdk{
  display:flex;align-items:center;gap:10px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);
  padding:7px 11px;color:var(--fg-2);font-size:13px;min-width:230px;
}
.cmdk:hover{border-color:var(--line-strong);color:var(--fg-1)}
.cmdk .kbd{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);background:var(--surface-3);border:1px solid var(--line);border-radius:var(--r-xs);padding:1px 6px}
.hdr-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface-3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-1);font-weight:600}

/* ---------- Utility strip ---------- */
.ustrip{display:flex;align-items:center;gap:18px;padding:11px 20px;border-bottom:1px solid var(--line-soft);background:var(--surface-0)}
.ustat{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.ustat .num{font-family:var(--font-mono);font-weight:600}
.ustat.review{color:var(--accent-hover)}
.ustat.review .chev{stroke:var(--accent-hover)}
.ustat.blocked{color:var(--fg-1)}
.ustat .dot{width:7px;height:7px;border-radius:50%}
.ustrip-spacer{flex:1}
.ustrip-meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}

/* ---------- Category tabs ---------- */
.tabs{display:flex;align-items:center;gap:4px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--surface-0);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:var(--r-md);font-size:13px;font-weight:500;color:var(--fg-2);white-space:nowrap;border:1px solid transparent}
.tab:hover{color:var(--fg-0);background:var(--surface-1)}
.tab.active{color:var(--fg-0);background:var(--surface-2);border-color:var(--line)}
.tab .cnt{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);background:var(--surface-3);border-radius:var(--r-xs);padding:0 5px;min-width:18px;text-align:center}
.tab.active .cnt{color:var(--fg-1)}

/* ---------- Board ---------- */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 20px 40px;align-items:start;flex:1}
.col{display:flex;flex-direction:column;gap:10px;min-width:0}
.col-hd{display:flex;align-items:center;gap:8px;padding:2px 2px 4px;position:sticky;top:0}
.col-hd .ctitle{font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-2)}
.col-hd .ccount{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-xs);padding:0 6px}
.col-hd .cglyph{margin-left:auto}

/* ---------- Card ---------- */
.card{
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:12px;display:flex;flex-direction:column;gap:10px;
}
.card:hover{border-color:var(--line-strong)}
.card-top{display:flex;align-items:flex-start;gap:10px}
.tile{
  width:28px;height:28px;flex:none;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:600;
}
.card-headtxt{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.card-statusrow{display:flex;align-items:center;gap:6px}
.card-status-lbl{font-size:11px;font-weight:600;letter-spacing:.01em}
.card-id{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto}
.card-title{font-family:var(--font-body);font-weight:560;font-size:14.5px;line-height:1.32;color:var(--fg-0);letter-spacing:-.005em}
.card-desc{font-size:12.5px;line-height:1.4;color:var(--fg-2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:-.01em}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-xs);padding:2px 7px}
.chip svg{stroke:var(--fg-3)}
.card-foot{display:flex;align-items:center;gap:10px;padding-top:2px}
.dots{display:flex;align-items:center;gap:4px}
.dot4{width:6px;height:6px;border-radius:50%}
.dot4.t{background:var(--ok-verify)}
.dot4.f{background:var(--ok-alarm)}
.dot4.n{background:var(--surface-4)}
.wpill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10.5px;font-weight:500;color:var(--fg-2);background:var(--surface-1);border:1px solid var(--line);border-radius:999px;padding:2px 8px;letter-spacing:.02em}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--st-working);box-shadow:0 0 0 0 rgba(91,157,240,.5)}
.live-dot.is-live{animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,157,240,.45)}70%{box-shadow:0 0 0 6px rgba(91,157,240,0)}100%{box-shadow:0 0 0 0 rgba(91,157,240,0)}}
.foot-spacer{flex:1}
.card-actions{display:flex;gap:6px;border-top:1px solid var(--line-soft);padding-top:10px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 10px;border-radius:var(--r-sm);border:1px solid var(--line);color:var(--fg-1);background:transparent}
.btn:hover{background:var(--surface-3);border-color:var(--line-strong)}
.btn svg{stroke:currentColor}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
.btn.primary:hover{background:var(--accent-hover)}
.btn.flex{flex:1;justify-content:center}

/* ---------- Status glyph ---------- */
.glyph{flex:none}

/* ============ SESSION ============ */
.session{display:flex;flex-direction:column;min-height:100vh;max-width:920px;margin:0 auto;width:100%;border-left:1px solid var(--line);border-right:1px solid var(--line);background:var(--surface-0)}
.s-hd{display:flex;flex-direction:column;gap:12px;padding:16px 22px;border-bottom:1px solid var(--line);background:var(--surface-0);position:sticky;top:0;z-index:10}
.s-hd-top{display:flex;align-items:flex-start;gap:12px}
.s-hd-txt{flex:1;min-width:0}
.s-hd-title{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--fg-0);line-height:1.3;letter-spacing:-.01em}
.s-hd-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:7px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
.s-hd-meta .sep{color:var(--line-strong)}
.s-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;border-radius:var(--r-xs);padding:2px 7px;border:1px solid var(--line)}
.s-badge.live{color:var(--accent-hover);border-color:var(--accent-line);background:var(--accent-tint)}
.s-actions{display:flex;gap:8px}
.s-body{flex:1;display:flex;flex-direction:column;gap:0;padding:0 22px 0}
.brief{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface-1);margin:18px 0 8px;overflow:hidden}
.brief-hd{display:flex;align-items:center;gap:9px;padding:12px 14px;width:100%;text-align:left}
.brief-hd .bt{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--fg-0)}
.brief-hd .caret{margin-left:auto;transition:transform .15s;stroke:var(--fg-3)}
.brief.open .brief-hd .caret{transform:rotate(90deg)}
.brief-body{display:none;padding:0 14px 14px;flex-direction:column;gap:14px}
.brief.open .brief-body{display:flex}
.brief-sec-lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);margin-bottom:7px}
.brief-sum{font-size:13px;color:var(--fg-1);line-height:1.5}
.plan-list{list-style:none;display:flex;flex-direction:column;gap:7px;counter-reset:p}
.plan-list li{display:flex;gap:10px;font-size:13px;color:var(--fg-1);line-height:1.45}
.plan-list li::before{counter-increment:p;content:counter(p);font-family:var(--font-mono);font-size:11px;color:var(--fg-3);background:var(--surface-3);border-radius:var(--r-xs);width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px}
.acc-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--fg-1);padding:3px 0}
.transcript{display:flex;flex-direction:column;gap:14px;padding:16px 0 0}
.msg{display:flex;gap:11px}
.msg-think{color:var(--fg-3);font-style:italic;font-size:13px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.msg-think .caret{stroke:var(--fg-3);margin-top:4px;flex:none}
.tool-row{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-sm);padding:7px 10px;color:var(--fg-2);flex-wrap:wrap}
.tool-row .tn{color:var(--fg-1);font-weight:500}
.tool-row .arg{color:var(--fg-2)}
.tool-row .arrow{color:var(--fg-3)}
.tool-row .res{color:var(--ok-verify)}
.tool-row svg{stroke:var(--fg-3);flex:none}
.bubble{display:flex;gap:11px;align-items:flex-start}
.bubble-body{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:10px 13px;font-size:13.5px;line-height:1.5;color:var(--fg-1);max-width:680px}
.bubble.user{flex-direction:row-reverse}
.bubble.user .bubble-body{background:var(--accent-tint);border-color:var(--accent-line);color:var(--fg-0)}
.bubble .ts{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px}
.composer{position:sticky;bottom:0;display:flex;align-items:center;gap:10px;padding:14px 22px;border-top:1px solid var(--line);background:var(--surface-0)}
.composer .inp{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:9px 12px;color:var(--fg-3);font-family:var(--font-mono);font-size:12.5px}

/* ============ OBJECTIVE MODAL ============ */
.backdrop{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;background:rgba(6,8,11,.66)}
.modal{width:100%;max-width:620px;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-xl);overflow:hidden}
.m-hd{display:flex;align-items:flex-start;gap:13px;padding:20px 22px 16px;border-bottom:1px solid var(--line)}
.m-hd-txt{flex:1;min-width:0}
.m-statusrow{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.m-status-lbl{font-size:11px;font-weight:600;letter-spacing:.02em}
.m-id{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto}
.m-title{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--fg-0);line-height:1.3;letter-spacing:-.01em}
.m-desc{font-size:13.5px;color:var(--fg-1);line-height:1.5;padding:16px 22px;border-bottom:1px solid var(--line-soft)}
.m-close{position:absolute;top:18px;right:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border-bottom:1px solid var(--line)}
.gcell{background:var(--surface-2);padding:12px 22px}
.gcell .k{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3);margin-bottom:4px}
.gcell .v{font-family:var(--font-mono);font-size:12.5px;color:var(--fg-1)}
.m-mid{display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid var(--line)}
.m-mid-lbl{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3)}
.m-foot{display:flex;gap:9px;padding:16px 22px}

/* ============ COMMAND PALETTE (board, optional/closed) ============ */
.palette-wrap{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;background:rgba(6,8,11,.55);z-index:50}
.palette-wrap.open{display:flex}
.palette{width:100%;max-width:560px;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-xl);overflow:hidden}
.pal-inp{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.pal-inp input{flex:1;background:none;border:none;outline:none;color:var(--fg-0);font-family:var(--font-body);font-size:15px}
.pal-inp input::placeholder{color:var(--fg-3)}
.pal-list{padding:6px;max-height:300px;overflow:auto}
.pal-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-sm);font-size:13.5px;color:var(--fg-1)}
.pal-item:hover{background:var(--surface-3)}
.pal-item svg{stroke:var(--fg-2)}
.pal-item .k{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3)}

/* ============ MOBILE BOTTOM TAB BAR ============ */
.tabbar{display:none}

/* ============ MOBILE ============ */
body[data-frame="mobile"] .hdr{padding:11px 14px;gap:10px}
body[data-frame="mobile"] .brand-sub{display:none}
body[data-frame="mobile"] .cmdk{min-width:0;flex:1;padding:7px 10px}
body[data-frame="mobile"] .cmdk .label{display:none}
body[data-frame="mobile"] .hdr-avatar{display:none}
body[data-frame="mobile"] .ustrip{padding:9px 14px;gap:14px}
body[data-frame="mobile"] .ustrip-meta{display:none}
body[data-frame="mobile"] .tabs{padding:9px 14px}

body[data-frame="mobile"] .board{display:block;padding:14px 14px 92px}
body[data-frame="mobile"] .lane-seg{display:flex;gap:4px;padding:4px;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:14px}
body[data-frame="mobile"] .lane-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--fg-2);min-height:40px}
body[data-frame="mobile"] .lane-btn.active{background:var(--surface-3);color:var(--fg-0)}
body[data-frame="mobile"] .lane-btn .cnt{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
body[data-frame="mobile"] .col{display:none}
body[data-frame="mobile"] .col.lane-active{display:flex}
body[data-frame="mobile"] .col-hd{display:none}
/* dense mobile rows */
body[data-frame="mobile"] .card{padding:12px;gap:9px}
body[data-frame="mobile"] .card-title{font-size:14px}
body[data-frame="mobile"] .card-desc{display:none}
body[data-frame="mobile"] .card-actions .btn{min-height:42px}

.lane-seg{display:none}
body:not([data-frame="mobile"]) .lane-seg{display:none}

body[data-frame="mobile"] .tabbar{
  display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:var(--surface-1);border-top:1px solid var(--line);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom));
}
body[data-frame="mobile"] .tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;min-height:44px;color:var(--fg-3);font-size:10px;font-weight:500}
body[data-frame="mobile"] .tabbar .tb svg{stroke:var(--fg-3)}
body[data-frame="mobile"] .tabbar .tb.active{color:var(--accent-hover)}
body[data-frame="mobile"] .tabbar .tb.active svg{stroke:var(--accent-hover)}

body[data-frame="mobile"] .session{border:none;max-width:none}
body[data-frame="mobile"] .s-hd{padding:14px}
body[data-frame="mobile"] .s-body{padding:0 14px}
body[data-frame="mobile"] .composer{padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
body[data-frame="mobile"] .s-hd-title{font-size:15px}
body[data-frame="mobile"] .bubble-body{max-width:none}

body[data-frame="mobile"] .backdrop{padding:0;align-items:stretch}
body[data-frame="mobile"] .modal{max-width:none;border-radius:0;border:none;min-height:100vh}
body[data-frame="mobile"] .grid{grid-template-columns:1fr}
body[data-frame="mobile"] .m-foot{flex-direction:column;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
body[data-frame="mobile"] .m-foot .btn{justify-content:center;min-height:46px}

@media (prefers-reduced-motion:reduce){.live-dot.is-live{animation:none}}
</style>
</head>
<body>
<div id="root"></div>
<script src="../data.js"></script>
<script>
(function(){
  var P = new URLSearchParams(location.search);
  var screen = P.get("screen") || "board";
  var frame = P.get("frame") || "desktop";
  document.body.dataset.screen = screen;
  document.body.dataset.frame = frame;

  var OK = window.OK;
  var esc = function(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});};

  // ---------- SVG icon helpers ----------
  function ico(p){return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
  var I = {
    bolt: ico('<path d="M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8z"/>'),
    chevR: ico('<path d="m9 6 6 6-6 6"/>'),
    eye: ico('<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>'),
    check: ico('<path d="M20 6 9 17l-5-5"/>'),
    redo: ico('<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/>'),
    branch: ico('<line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/>'),
    pr: ico('<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M6 9v6"/><path d="M18 9a9 9 0 0 0-9-9"/><circle cx="18" cy="6" r="3"/>'),
    search: ico('<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>'),
    x: ico('<path d="M18 6 6 18M6 6l12 12"/>'),
    stop: ico('<rect x="6" y="6" width="12" height="12" rx="2"/>'),
    send: ico('<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>'),
    play: ico('<path d="m6 4 14 8-14 8z"/>'),
    edit: ico('<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>'),
    board: ico('<rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/>'),
    sess: ico('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'),
    docs: ico('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>'),
    more: ico('<circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>'),
    caretSm:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  };

  // ---------- Status circular glyph (the signature motif) ----------
  function glyph(status, size){
    size = size || 16;
    var c = "var(--st-"+status+")";
    var r = size/2;
    var cx = r, cy = r, rad = r-2;
    var ring = '<circle cx="'+cx+'" cy="'+cy+'" r="'+rad+'" fill="none" stroke="'+c+'" stroke-width="2"/>';
    var inner='';
    if(status==="planning"){
      inner = '<circle cx="'+cx+'" cy="'+cy+'" r="'+rad+'" fill="none" stroke="'+c+'" stroke-width="2" stroke-dasharray="2 2.4"/>';
      ring='';
    } else if(status==="queue"){
      // empty ring (default ring only)
    } else if(status==="working"){
      // partial pie ~60%
      var a = 2*Math.PI*0.60, sx=cx+rad*Math.sin(0), sy=cy-rad*Math.cos(0);
      var ex=cx+rad*Math.sin(a), ey=cy-rad*Math.cos(a);
      inner='<path d="M'+cx+' '+cy+' L'+sx+' '+sy+' A'+rad+' '+rad+' 0 0 1 '+ex+' '+ey+' Z" fill="'+c+'"/>';
    } else if(status==="ai"||status==="review"){
      inner='<circle cx="'+cx+'" cy="'+cy+'" r="'+(rad*0.42)+'" fill="'+c+'"/>';
    } else if(status==="human"){
      ring=''; inner='<circle cx="'+cx+'" cy="'+cy+'" r="'+rad+'" fill="'+c+'"/>';
    } else if(status==="done"){
      ring='<circle cx="'+cx+'" cy="'+cy+'" r="'+rad+'" fill="'+c+'"/>';
      var s2=size;
      inner='<path d="M'+(s2*0.30)+' '+(s2*0.52)+' L'+(s2*0.44)+' '+(s2*0.66)+' L'+(s2*0.72)+' '+(s2*0.36)+'" fill="none" stroke="#0c0f14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    } else if(status==="blocked"){
      inner='<line x1="'+(cx-rad*0.5)+'" y1="'+cy+'" x2="'+(cx+rad*0.5)+'" y2="'+cy+'" stroke="'+c+'" stroke-width="2.4" stroke-linecap="round"/>';
    }
    return '<svg class="glyph" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+ring+inner+'</svg>';
  }

  function tile(agentKey){
    var a = OK.AGENTS[agentKey]; var c = "var(--agent-"+agentKey+")";
    return '<div class="tile" style="background:'+c+'1f;color:'+c+'">'+a.mono+'</div>';
  }

  function reviewDots(review){
    return '<div class="dots">'+review.map(function(v){
      var cls = v===true?"t":(v===false?"f":"n");
      return '<span class="dot4 '+cls+'"></span>';
    }).join('')+'</div>';
  }

  function metaLine(o){
    return esc(o.type)+' · '+esc(o.model)+' · '+o.sessions+' sessions · '+OK.fmtCost(o.cost);
  }

  function chipBranch(o){
    var out='';
    if(o.branch) out += '<span class="chip">'+I.branch+o.branch+'</span>';
    if(o.pr>0) out += '<span class="chip">'+I.pr+'#'+o.pr+'</span>';
    return out;
  }

  // ---------- CARD ----------
  function card(o){
    var st = OK.STATUS[o.status];
    var live = o.live ? '<span class="live-dot is-live" title="live"></span>' : '';
    var actions;
    if(o.status==="human"||o.status==="blocked"){
      actions = '<button class="btn primary flex">'+I.eye+'View</button><button class="btn flex">'+I.check+'Done</button><button class="btn">'+I.redo+'</button>';
    } else if(o.status==="done"){
      actions = '<button class="btn flex">'+I.eye+'View</button><button class="btn flex">'+I.branch+'PR</button>';
    } else {
      actions = '<button class="btn flex">'+I.eye+'View</button><button class="btn flex">'+I.redo+'Rework</button>';
    }
    var wpill = o.workers.total>0 ? '<span class="wpill">WORKERS '+o.workers.done+'/'+o.workers.total+'</span>' : '';
    return '<div class="card">'
      + '<div class="card-top">'+tile(o.agent)
      + '<div class="card-headtxt">'
      +   '<div class="card-statusrow">'+glyph(o.status,15)
      +     '<span class="card-status-lbl" style="color:var(--st-'+o.status+')">'+esc(st.label)+'</span>'
      +     live
      +     '<span class="card-id mono">'+esc(o.id)+'</span></div>'
      +   '<div class="card-title">'+esc(o.title)+'</div>'
      + '</div></div>'
      + '<div class="card-desc">'+esc(o.desc)+'</div>'
      + '<div class="card-meta mono">'+metaLine(o)+'</div>'
      + (chipBranch(o) ? '<div class="chips">'+chipBranch(o)+'</div>' : '')
      + '<div class="card-foot">'+reviewDots(o.review)+wpill+'</div>'
      + '<div class="card-actions">'+actions+'</div>'
      + '</div>';
  }

  // ---------- BOARD ----------
  function colOf(o){
    for(var i=0;i<OK.COLUMNS.length;i++){ if(OK.COLUMNS[i].statuses.indexOf(o.status)>=0) return OK.COLUMNS[i].key; }
    return "queue";
  }
  function catCount(cat){
    return OK.OBJECTIVES.filter(function(o){return cat==="All"||o.category===cat;}).length;
  }

  function renderBoard(){
    var objs = OK.OBJECTIVES;
    var needReview = objs.filter(function(o){return o.status==="human";}).length;
    var blocked = objs.filter(function(o){return o.status==="blocked";}).length;

    var tabs = OK.CATEGORIES.map(function(c,i){
      return '<button class="tab'+(i===0?' active':'')+'">'+esc(c)+'<span class="cnt mono">'+catCount(c)+'</span></button>';
    }).join('');

    var laneSeg = '<div class="lane-seg">'+OK.COLUMNS.map(function(col,i){
      var n = objs.filter(function(o){return colOf(o)===col.key;}).length;
      return '<button class="lane-btn'+(i===0?' active':'')+'" data-lane="'+col.key+'">'+col.title+'<span class="cnt mono">'+n+'</span></button>';
    }).join('')+'</div>';

    var cols = OK.COLUMNS.map(function(col,i){
      var inCol = objs.filter(function(o){return colOf(o)===col.key;});
      var hd = '<div class="col-hd"><span class="ctitle">'+esc(col.title)+'</span>'
        + '<span class="ccount mono">'+inCol.length+'</span></div>';
      return '<div class="col'+(i===0?' lane-active':'')+'" data-lane="'+col.key+'">'+hd
        + inCol.map(card).join('') + '</div>';
    }).join('');

    var palette = '<div class="palette-wrap" id="palwrap"><div class="palette">'
      + '<div class="pal-inp">'+I.search+'<input placeholder="Run a command or jump to an objective…" autocomplete="off"></div>'
      + '<div class="pal-list">'
      +   '<div class="pal-item">'+I.bolt+'New objective<span class="k">N</span></div>'
      +   '<div class="pal-item">'+I.eye+'Review queue<span class="k">R</span></div>'
      +   '<div class="pal-item">'+I.sess+'Open live session<span class="k">S</span></div>'
      +   '<div class="pal-item">'+I.check+'Mark objective done<span class="k">D</span></div>'
      + '</div></div></div>';

    document.getElementById("root").innerHTML =
      '<div class="app">'
      + header()
      + '<div class="ustrip">'
      +   '<div class="ustat review">'+I.chevR+'<span class="num">'+needReview+'</span>&nbsp;need your review</div>'
      +   '<div class="ustat blocked"><span class="dot" style="background:var(--st-blocked)"></span><span class="num">'+blocked+'</span>&nbsp;blocked</div>'
      +   '<div class="ustrip-spacer"></div>'
      +   '<div class="ustrip-meta">'+objs.length+' objectives · 5 workspaces</div>'
      + '</div>'
      + '<div class="tabs">'+tabs+'</div>'
      + laneSeg
      + '<div class="board">'+cols+'</div>'
      + tabbar("board")
      + palette
      + '</div>';

    // wire mobile lane segmented control
    document.querySelectorAll(".lane-btn").forEach(function(b){
      b.addEventListener("click",function(){
        document.querySelectorAll(".lane-btn").forEach(function(x){x.classList.remove("active");});
        b.classList.add("active");
        var lane=b.dataset.lane;
        document.querySelectorAll(".col").forEach(function(c){
          c.classList.toggle("lane-active", c.dataset.lane===lane);
        });
      });
    });
    // command palette toggle
    var trig=document.getElementById("cmdk-trigger"), pw=document.getElementById("palwrap");
    if(trig&&pw){
      trig.addEventListener("click",function(){pw.classList.add("open");});
      pw.addEventListener("click",function(e){if(e.target===pw)pw.classList.remove("open");});
      document.addEventListener("keydown",function(e){if(e.key==="Escape")pw.classList.remove("open");});
    }
    // category tabs
    document.querySelectorAll(".tab").forEach(function(t){
      t.addEventListener("click",function(){
        document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});
        t.classList.add("active");
      });
    });
  }

  // ---------- HEADER ----------
  function header(){
    return '<div class="hdr">'
      + '<div class="brand"><span class="brand-mark">'+I.bolt+'</span>'
      +   '<span class="brand-name">OperationKit</span>'
      +   '<span class="brand-sub mono">mission-control</span></div>'
      + '<div class="hdr-spacer"></div>'
      + '<button class="cmdk" id="cmdk-trigger">'+I.search+'<span class="label">Run a command…</span><span class="kbd">⌘K</span></button>'
      + '<div class="hdr-avatar mono">MK</div>'
      + '</div>';
  }

  // ---------- TAB BAR (mobile) ----------
  function tabbar(active){
    var items=[["board","Board",I.board],["sess","Sessions",I.sess],["jarvis","Jarvis",I.bolt],["docs","Docs",I.docs],["more","More",I.more]];
    return '<nav class="tabbar">'+items.map(function(it){
      return '<button class="tb'+(it[0]===active?' active':'')+'">'+it[2]+'<span>'+it[1]+'</span></button>';
    }).join('')+'</nav>';
  }

  // ---------- SESSION ----------
  function renderSession(){
    var s = OK.SESSION;
    var st = OK.STATUS[s.status];
    var msgs = s.messages.map(function(m){
      if(m.kind==="thinking"){
        return '<div class="msg-think">'+I.caretSm+'<span>'+esc(m.text)+'</span></div>';
      }
      if(m.kind==="tool"){
        return '<div class="tool-row">'+I.bolt+'<span class="tn">'+esc(m.name)+'</span>'
          + '<span class="arg">'+esc(m.arg)+'</span><span class="arrow">→</span>'
          + '<span class="res">'+esc(m.result)+'</span></div>';
      }
      if(m.kind==="user"){
        return '<div class="bubble user"><div class="hdr-avatar mono">MK</div>'
          + '<div><div class="bubble-body">'+esc(m.text)+'</div><div class="ts mono" style="text-align:right">'+esc(m.t)+'</div></div></div>';
      }
      return '<div class="bubble">'+tile(s.agent)
        + '<div><div class="bubble-body">'+esc(m.text)+'</div><div class="ts mono">'+esc(m.t)+'</div></div></div>';
    }).join('');

    var plan = s.brief.plan.map(function(p){return '<li>'+esc(p)+'</li>';}).join('');
    var acc = s.brief.acceptance.map(function(a){
      var g = a.pass===true?"done":(a.pass===false?"blocked":"queue");
      return '<div class="acc-row">'+glyph(g,15)+'<span>'+esc(a.label)+'</span></div>';
    }).join('');

    document.getElementById("root").innerHTML =
      '<div class="app"><div class="session">'
      + '<div class="s-hd"><div class="s-hd-top">'+tile(s.agent)
      +   '<div class="s-hd-txt"><div class="s-hd-title">'+esc(s.title)+'</div>'
      +     '<div class="s-hd-meta">'
      +       glyph(s.status,14)+'<span style="color:var(--st-'+s.status+');font-weight:600">'+esc(st.label)+'</span>'
      +       (s.live?'<span class="s-badge live"><span class="live-dot is-live"></span>LIVE</span>':'')
      +       '<span class="sep">·</span>'+esc(s.workspace)
      +       '<span class="sep">·</span>'+s.sessionCount+' sessions'
      +       '<span class="sep">·</span>'+OK.fmtCost(s.cost)
      +       '<span class="sep">·</span>'+esc(s.sessionId)
      +     '</div></div></div>'
      +   '<div class="s-actions"><button class="btn primary">'+I.check+'Approve</button>'
      +     '<button class="btn">'+I.redo+'Rework</button>'
      +     '<button class="btn">'+I.check+'Done</button></div>'
      + '</div>'
      + '<div class="s-body">'
      +   '<div class="brief open" id="brief"><button class="brief-hd">'+I.docs+'<span class="bt">Objective Brief</span><span class="caret">'+I.chevR+'</span></button>'
      +     '<div class="brief-body">'
      +       '<div><div class="brief-sec-lbl">Summary</div><div class="brief-sum">'+esc(s.brief.summary)+'</div></div>'
      +       '<div><div class="brief-sec-lbl">Approved Plan</div><ol class="plan-list">'+plan+'</ol></div>'
      +       '<div><div class="brief-sec-lbl">Acceptance</div>'+acc+'</div>'
      +     '</div></div>'
      +   '<div class="transcript">'+msgs+'</div>'
      + '</div>'
      + '<div class="composer"><div class="inp mono">'+I.send+'Send a follow-up…</div>'
      +   '<button class="btn">'+I.stop+'Stop</button></div>'
      + '</div>'
      + tabbar("sess")
      + '</div>';

    var brief=document.getElementById("brief");
    brief.querySelector(".brief-hd").addEventListener("click",function(){brief.classList.toggle("open");});
  }

  // ---------- OBJECTIVE MODAL ----------
  function renderObjective(){
    var o = OK.DETAIL; var st = OK.STATUS[o.status];
    function cell(k,v){return '<div class="gcell"><div class="k">'+k+'</div><div class="v mono">'+esc(v)+'</div></div>';}
    var grid = ''
      + cell("Workspace", o.workspace)
      + cell("Category", o.category)
      + cell("Type", o.type)
      + cell("Model", o.model)
      + cell("Branch", o.branch||"—")
      + cell("PR", o.pr>0?("#"+o.pr):"—")
      + cell("Sessions", o.sessions)
      + cell("Cost", OK.fmtCost(o.cost))
      + cell("Updated", OK.fmtTime(o.updated));

    document.getElementById("root").innerHTML =
      '<div class="app"><div class="backdrop"><div class="modal" style="position:relative">'
      + '<button class="m-close btn" style="padding:6px">'+I.x+'</button>'
      + '<div class="m-hd">'+tile(o.agent)
      +   '<div class="m-hd-txt"><div class="m-statusrow">'+glyph(o.status,16)
      +     '<span class="m-status-lbl" style="color:var(--st-'+o.status+')">'+esc(st.label)+'</span>'
      +     (o.live?'<span class="live-dot is-live"></span>':'')
      +     '<span class="m-id mono">'+esc(o.id)+'</span></div>'
      +   '<div class="m-title">'+esc(o.title)+'</div></div>'
      + '</div>'
      + '<div class="m-desc">'+esc(o.desc)+'</div>'
      + '<div class="grid">'+grid+'</div>'
      + '<div class="m-mid"><span class="m-mid-lbl">AI Review</span>'+reviewDots(o.review)
      +   '<span class="wpill">WORKERS '+o.workers.done+'/'+o.workers.total+'</span></div>'
      + '<div class="m-foot"><button class="btn primary flex">'+I.play+'Open session</button>'
      +   '<button class="btn flex">'+I.edit+'Edit</button>'
      +   '<button class="btn flex">'+I.check+'Mark done</button></div>'
      + '</div></div>'
      + tabbar("board")
      + '</div>';
  }

  // ---------- route ----------
  if(screen==="session") renderSession();
  else if(screen==="objective") renderObjective();
  else renderBoard();
})();
</script>
</body>
</html>
